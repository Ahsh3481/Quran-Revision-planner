<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Revision Planner</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">


<link rel="apple-touch-icon" sizes="180x180" href="favicon.png">

<link rel="icon" type="image/png" sizes="192x192" href="favicon.png">
  <style>
    body {
      background-color: #f0f2f5;
    }

    .container {
      margin-top: 3rem;
      max-width: 900px;
    }

    .plan-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .plan-day {
      background: #ffffff;
      border-left: 6px solid #0d6efd;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      padding: 1rem;
      transition: transform 0.2s ease;
    }

    .plan-day:hover {
      transform: scale(1.03);
    }

    .plan-day strong {
      font-size: 1.1rem;
      color: #0d6efd;
      display: block;
      margin-bottom: 0.5rem;
    }

    .plan-day span {
      font-size: 0.95rem;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4 text-center">Quran Revision Planner</h1>
    <form id="plannerForm" class="row g-3">
      <div class="col-md-6">
        <label for="startDate" class="form-label">Start Date</label>
        <input type="date" id="startDate" class="form-control" required />
      </div>
      <div class="col-md-6">
        <label for="endDate" class="form-label">End Date</label>
        <input type="date" id="endDate" class="form-control" required />
      </div>
      <div class="col-md-6">
        <label for="startSurah" class="form-label">From Surah</label>
        <select id="startSurah" class="form-select" required></select>
      </div>
      <div class="col-md-6">
        <label for="endSurah" class="form-label">To Surah</label>
        <select id="endSurah" class="form-select" required></select>
      </div>
      <div class="col-12 text-center">
        <button type="submit" class="btn btn-primary mt-3 px-5">
          Generate Plan
        </button>
        <button id="downloadCalendar" class="btn btn-primary mt-3">Download to Calendar</button>

      </div>
    </form>

    <div id="plan" class="plan-container"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
